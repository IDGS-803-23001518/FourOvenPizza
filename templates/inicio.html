{% extends layout %}

{% block title %}Inicio{% endblock %}

{% block container %}
<nav class="bg-gradient-to-r from-[#38230f] to-[#4a3a2a] px-4 sm:px-6 py-0 mb-6 relative shadow-lg h-16 flex items-center"
    style="border-bottom: 3px solid #f29f05;">
    <div class="container flex flex-wrap items-center justify-between mx-auto">
        <div class="flex-1 flex justify-center">
            <div class="flex items-center space-x-2 sm:space-x-3 bg-opacity-20 px-3 sm:px-6 py-2 rounded-full">
                <span class="text-base sm:text-2xl font-bold text-white tracking-wider">Dashboard</span>
            </div>
        </div>
    </div>
</nav>

<div class="container mx-auto px-4 sm:px-6 max-w-6xl">
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div
        class="mb-4 p-4 rounded-lg {% if category == 'success' %}bg-green-100 text-green-700{% elif category == 'danger' %}bg-red-100 text-red-700{% else %}bg-blue-100 text-blue-700{% endif %}">
        {{ message }}
    </div>
    {% endfor %}
    {% endif %}
    {% endwith %}
</div>

{% endblock %}
