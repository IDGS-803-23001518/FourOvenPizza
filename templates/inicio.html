{% extends "layoutAdmin.html" %}

{% block title %}Inicio{% endblock %}

{% block container %}
<nav class="bg-gradient-to-r from-[#38230f] to-[#4a3a2a] px-4 sm:px-6 py-0 mb-6 relative shadow-lg h-16 flex items-center" style="border-bottom: 3px solid #f29f05;">
    <div class="container flex flex-wrap items-center justify-between mx-auto">
        <div class="flex-1 flex justify-center">

                <span class="text-2xl font-bold text-white tracking-wider">Dashboard</span>
            </div>
        </div>
        
        <div class="w-12 flex justify-end md:hidden">
            <button data-collapse-toggle="navbar-cta" type="button"

                    xmlns="http://www.w3.org/2000/svg">

                        d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z"

<div class="container mx-auto px-4 ml-16">
    
</div>
