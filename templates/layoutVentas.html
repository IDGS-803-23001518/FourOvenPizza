<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FourOvenPizza - {% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{{url_for('static',filename='dist/output.css')}}">
    <style>
        .sidebar-gradient { background: linear-gradient(180deg, #38230f 0%, #2b1c0c 100%); }
        .menu-item-hover { transition: all 0.3s ease; }
        .menu-item-hover:hover { background-color: rgba(242,159,5,0.2); color: #f29f05; transform: translateX(5px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @media (min-width: 1024px) { .menu-text { font-size: 0.9rem; } .submenu-text { font-size: 0.8rem; } }
        main { transition: margin-left 0.3s ease-in-out; }
        @media (min-width: 769px) {
            body:not(.sidebar-closed) main { margin-left: 288px; }
            body.sidebar-closed main { margin-left: 0; }
            body:not(.sidebar-closed) .sidebar-toggle-button { margin-left: 288px; }
            body.sidebar-closed .sidebar-toggle-button { margin-left: 0; }
            #drawer-navigation { transition: transform 0.3s ease-in-out; }
            body:not(.sidebar-closed) #drawer-navigation { transform: translateX(0) !important; }
            body.sidebar-closed #drawer-navigation { transform: translateX(-100%) !important; }
            [drawer-backdrop] { display: none !important; }
            main { position: relative; z-index: 1; pointer-events: auto; }
        }
        @media (max-width: 768px) {
            main { margin-left: 0; padding: 0.5rem; }
            #drawer-navigation { width: 85%; max-width: 280px; transition: transform 0.3s ease-in-out; transform: translateX(-100%); }
            .container { padding-left: 0.75rem; padding-right: 0.75rem; }
            .sidebar-toggle-button { margin-left: 0 !important; }
            #drawer-navigation.open-mobile { transform: translateX(0) !important; }
        }
        .sidebar-separator { border-top: 1px solid rgba(242,159,5,0.3); margin: 0.75rem 0; }
        .sidebar-toggle-button { transition: margin-left 0.3s ease-in-out; }
    </style>
</head>

<body class="bg-center bg-fixed bg-no-repeat"
    style="background-image: url('{{url_for('static',filename='img/FondosUtilizados/FondoF.png')}}'); background-size: cover; background-color: #f5f5f5;">

    <div class="fixed top-0 left-0 z-30 h-16 flex items-center sidebar-toggle-button">
        <button type="button" id="sidebar-toggle-btn"
            class="inline-flex items-center justify-center p-3 ml-4 text-white bg-[#38230f] rounded-xl hover:bg-[#4a3a2a] focus:outline-none focus:ring-2 focus:ring-[#f29f05] transition-all duration-300 shadow-lg hover:shadow-xl">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
        </button>
    </div>

    <div id="drawer-navigation"
        class="fixed top-0 left-0 z-30 w-72 h-full p-4 overflow-y-auto sidebar-gradient border-r border-[#f29f05] shadow-2xl no-scrollbar"
        tabindex="-1">

        <div class="border-b border-[#f29f05] pb-3 mb-3 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <div class="bg-white p-1.5 rounded-xl shadow-lg">
                    <img src="{{url_for('static',filename='img/Logo FourOvenPizzas/logopizza.png')}}" class="h-8 w-8" alt="Logo"/>
                </div>
                <div>
                    <span class="block text-base font-bold text-white">FourOvenPizza</span>
                    <span class="text-[10px] text-[#f29f05]">Ventas</span>
                </div>
            </div>
            <button type="button" id="sidebar-hide-btn"
                class="text-gray-300 bg-transparent hover:bg-white hover:bg-opacity-10 rounded-lg w-7 h-7 flex items-center justify-center transition-all duration-300">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18 17.94 6M18 18 6.06 6"/>
                </svg>
            </button>
        </div>

        <div class="py-1 overflow-y-visible h-[calc(100%-80px)] no-scrollbar">
            <ul class="space-y-1 font-medium">

                <li>
                    <a href="/inicio"
                        class="flex items-center px-3 py-2 text-sm text-gray-200 rounded-xl hover:bg-[#f29f05] hover:bg-opacity-20 hover:text-[#f29f05] group menu-item-hover menu-text">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                        </svg>
                        <span class="ms-3">Dashboard</span>
                    </a>
                </li>

                <li>
                    <a href="#"
                        class="flex items-center px-3 py-2 text-sm text-gray-200 rounded-xl hover:bg-[#f29f05] hover:bg-opacity-20 hover:text-[#f29f05] group menu-item-hover menu-text">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"/>
                        </svg>
                        <span class="ms-3">Prod. terminados</span>
                    </a>
                </li>

                <li>
                    <button type="button"
                        class="flex items-center w-full justify-between px-3 py-2 text-sm text-gray-200 rounded-xl hover:bg-[#f29f05] hover:bg-opacity-20 hover:text-[#f29f05] group menu-item-hover menu-text"
                        aria-controls="ventas" data-collapse-toggle="ventas">
                        <div class="flex items-center">
                            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                            <span class="flex-1 ms-3 text-left">Ventas</span>
                        </div>
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
                        </svg>
                    </button>
                    <ul id="ventas" class="hidden py-1 space-y-0.5 ps-10">
                        <li><a href="#" class="block px-3 py-1.5 text-xs text-gray-300 rounded-lg hover:bg-[#f29f05] hover:bg-opacity-10 submenu-text">Registrar</a></li>
                        <li><a href="#" class="block px-3 py-1.5 text-xs text-gray-300 rounded-lg hover:bg-[#f29f05] hover:bg-opacity-10 submenu-text">Consultar</a></li>
                    </ul>
                </li>

                <li>
                    <button type="button"
                        class="flex items-center w-full justify-between px-3 py-2 text-sm text-gray-200 rounded-xl hover:bg-[#f29f05] hover:bg-opacity-20 hover:text-[#f29f05] group menu-item-hover menu-text"
                        aria-controls="produccion" data-collapse-toggle="produccion">
                        <div class="flex items-center">
                            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            </svg>
                            <span class="flex-1 ms-3 text-left">Producción</span>
                        </div>
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
                        </svg>
                    </button>
                    <ul id="produccion" class="hidden py-1 space-y-0.5 ps-10">
                        <li><a href="#" class="block px-3 py-1.5 text-xs text-gray-300 rounded-lg hover:bg-[#f29f05] hover:bg-opacity-10 submenu-text">Órdenes</a></li>
                        <li><a href="#" class="block px-3 py-1.5 text-xs text-gray-300 rounded-lg hover:bg-[#f29f05] hover:bg-opacity-10 submenu-text">Activas</a></li>
                    </ul>
                </li>

                <div class="sidebar-separator"></div>

                <li>
                    <a href="/cambiar-contraseña"
                        class="flex items-center px-3 py-2 text-sm text-gray-200 rounded-xl hover:bg-[#f29f05] hover:bg-opacity-20 hover:text-[#f29f05] group menu-item-hover menu-text">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
                        </svg>
                        <span class="ms-3">Cambiar Contraseña</span>
                    </a>
                </li>

                <li>
                    <a href="{{ url_for('autentificacion.logout') }}"
                        class="flex items-center px-3 py-2 text-sm text-gray-200 rounded-xl hover:bg-red-500 hover:bg-opacity-20 hover:text-red-400 group menu-item-hover menu-text">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                        </svg>
                        <span class="ms-3">Cerrar Sesión</span>
                    </a>
                </li>

            </ul>
        </div>
    </div>

    <main>
        {% block container %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const drawer = document.getElementById('drawer-navigation');
            const toggleBtn = document.getElementById('sidebar-toggle-btn');
            const hideBtn = document.getElementById('sidebar-hide-btn');
            let isMobileOpen = false;

            function openMobileSidebar() { if (window.innerWidth < 769) { drawer.classList.add('open-mobile'); isMobileOpen = true; } }
            function closeMobileSidebar() { drawer.classList.remove('open-mobile'); isMobileOpen = false; }
            function openDesktopSidebar() { document.body.classList.remove('sidebar-closed'); drawer.style.transform = 'translateX(0)'; }
            function closeDesktopSidebar() { document.body.classList.add('sidebar-closed'); drawer.style.transform = 'translateX(-100%)'; }

            toggleBtn.addEventListener('click', function (e) {
                e.preventDefault();
                if (window.innerWidth >= 769) {
                    document.body.classList.contains('sidebar-closed') ? openDesktopSidebar() : closeDesktopSidebar();
                } else {
                    isMobileOpen ? closeMobileSidebar() : openMobileSidebar();
                }
            });

            hideBtn.addEventListener('click', function (e) {
                e.preventDefault();
                window.innerWidth >= 769 ? closeDesktopSidebar() : closeMobileSidebar();
            });

            document.addEventListener('click', function (e) {
                if (window.innerWidth < 769 && isMobileOpen && !drawer.contains(e.target) && !toggleBtn.contains(e.target)) {
                    closeMobileSidebar();
                }
            });

            window.addEventListener('resize', function () {
                if (window.innerWidth >= 769) {
                    if (isMobileOpen) closeMobileSidebar();
                    drawer.style.transform = document.body.classList.contains('sidebar-closed') ? 'translateX(-100%)' : 'translateX(0)';
                } else {
                    document.body.classList.remove('sidebar-closed');
                    drawer.style.transform = '';
                    closeMobileSidebar();
                }
            });

            if (window.innerWidth >= 769) {
                document.body.classList.remove('sidebar-closed');
                drawer.style.transform = 'translateX(0)';
            } else {
                closeMobileSidebar();
            }
        });
    </script>
</body>
</html>
